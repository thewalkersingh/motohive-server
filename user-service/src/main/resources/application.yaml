server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3306/motohive_users?useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: UserServiceHikariPool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: vehicle-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.motohive.*"

motohive:
  jwt:
    secret: ${JWT_SECRET:3d6f4a9c8b2e1f7a5c0d3e9b4a7f2c1d8e5b3a6f9c2e4b7a1d3f6c9e2b5a8d1}
    access-token-expiry-ms: 3600000       # 1 hour
    refresh-token-expiry-ms: 604800000    # 7 days

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method       # sorts by GET/POST/PATCH/DELETE
    tags-sorter: alpha              # sorts controllers alphabetically
    try-it-out-enabled: true        # enables Try it out by default
  show-actuator: false

logging:
  level:
    com.motohive.userservice: DEBUG
    org.springframework.security: INFO