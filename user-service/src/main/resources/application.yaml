server:
  port: 8081

spring:
  application:
    name: user-service   # used by API Gateway for routing

  # ── Database ──────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/motohive_users?useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}       # env var with fallback
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: UserServiceHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000          # ms
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ───────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate                 # Flyway owns schema, Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Flyway ────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Kafka ─────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.motohive.*"

# ── Logging ───────────────────────────────────────
logging:
  level:
    com.motohive.userservice: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG

# ── App-level custom config ───────────────────────
motohive:
  jwt:
    secret: ${JWT_SECRET:my-dev-secret-key}
    expiry-ms: 86400000   # 24 hours