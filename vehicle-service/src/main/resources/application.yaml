server:
  port: 8082

spring:
  application:
    name: vehicle-service

  datasource:
    url: jdbc:mysql://localhost:3306/motohive_vehicles?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: VehicleServiceHikariPool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: vehicle-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.motohive.*"

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method       # sorts by GET/POST/PATCH/DELETE
    tags-sorter: alpha              # sorts controllers alphabetically
    try-it-out-enabled: true        # enables Try it out by default
  show-actuator: false
  paths-to-match: /api/v1/**

logging:
  level:
    com.motohive.vehicleservice: DEBUG